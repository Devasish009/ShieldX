<!DOCTYPE html>
<html>
<head>
<style>
@keyframes colorChange {
  0%   { color: red; }
  25%  { color: orange; }
  50%  { color: green; }
  75%  { color: blue; }
  100% { color: red; }
}

p {
  animation: colorChange 4s infinite; /* 4 seconds lo repeat avuthundi */
}
</style>
</head>
<body>

<p>Automatic ga color change avutondi!</p>

</body>
</html>
